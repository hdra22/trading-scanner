name: Trading Scanner

# Corre de 4 em 4 horas às :05 — horário Portugal (UTC+1 verão)
# 00:05 PT = 23:05 UTC | 04:05 PT = 03:05 UTC | 08:05 PT = 07:05 UTC
# 12:05 PT = 11:05 UTC | 16:05 PT = 15:05 UTC | 20:05 PT = 19:05 UTC
on:
  schedule:
    - cron: '5 23,3,7,11,15,19 * * *'
  workflow_dispatch:   # permite trigger manual pelo GitHub

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Correr scanner
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -X utf8 scanner.py
